name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Create gradle wrapper
        run: |
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew

      - name: Create env file
        run: |
          echo "MAPS_API_KEY=placeholder" > .env.example
          echo "FIREBASE_API_KEY=placeholder" >> .env.example

      - name: Fix icon resources
        run: |
          find app/src/main/res -name "*.png" -path "*/mipmap*" -delete
          rm -f app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          echo "Fixed icon resources"

      - name: Generate release keystore
        run: |
          rm -f my-upload-key.jks
          keytool -genkeypair \
            -alias upload \
            -keypass bgwrap123 \
            -keystore my-upload-key.jks \
            -storepass bgwrap123 \
            -dname "CN=BGWrap,O=BGWrap,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Build Release APK and AAB
        run: |
          ./gradlew assembleRelease --stacktrace
          ./gradlew bundleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: BGWrap_release.apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: BGWrap_release.aab
          path: app/build/outputs/bundle/release/*.aab
